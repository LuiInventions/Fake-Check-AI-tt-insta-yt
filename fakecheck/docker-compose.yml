version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: fakecheck-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    networks:
      - fakecheck-net

  worker:
    build:
      context: ./backend
    container_name: fakecheck-worker
    command: celery -A celery_app worker --loglevel=info
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    networks:
      - fakecheck-net

  redis:
    image: redis:7-alpine
    container_name: fakecheck-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fakecheck-net

  frontend:
    build:
      context: ./frontend
    container_name: fakecheck-frontend
    ports:
      - "3000:3000"
    environment:
      # Use /api internally for Next.js SSR to hit backend, or rely on URL logic 
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - fakecheck-net

  nginx:
    image: nginx:alpine
    container_name: fakecheck-nginx
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/frames:/data/frames:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fakecheck-net

networks:
  fakecheck-net:

volumes:
  redis_data:
